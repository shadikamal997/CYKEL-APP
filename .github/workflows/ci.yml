name: CYKEL CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Manual trigger

env:
  FLUTTER_VERSION: '3.11.0'
  JAVA_VERSION: '17'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Flutter Analyze (Lint Check)
  # ────────────────────────────────────────────────────────────────────────────
  analyze:
    name: 📊 Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./cykel
        run: flutter pub get

      - name: 🔍 Run flutter analyze
        working-directory: ./cykel
        run: flutter analyze --no-fatal-infos

      - name: ✅ Verify formatting
        working-directory: ./cykel
        run: dart format --set-exit-if-changed --line-length 80 lib/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit & Widget Tests
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Flutter Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./cykel
        run: flutter pub get

      - name: 🧪 Run unit and widget tests
        working-directory: ./cykel
        run: flutter test --coverage --reporter expanded

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cykel/coverage/lcov.info
          flags: unittests
          name: cykel-coverage
          fail_ci_if_error: false  # Don't fail if Codecov is down

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Android APK
  # ────────────────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./cykel
        run: flutter pub get

      - name: 🏗️ Build debug APK
        working-directory: ./cykel
        run: flutter build apk --debug --split-per-abi

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: cykel/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Build Android Release (Only on main branch)
  # ────────────────────────────────────────────────────────────────────────────
  build-android-release:
    name: 🚀 Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./cykel
        run: flutter pub get

      - name: 📝 Create key.properties from secrets
        working-directory: ./cykel/android
        env:
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: echo "$KEY_PROPERTIES" > key.properties

      - name: 🔐 Decode keystore
        working-directory: ./cykel/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: 🏗️ Build release APK
        working-directory: ./cykel
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: cykel/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 🚀 Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: beta-testers
          file: cykel/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          releaseNotes: |
            Build: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Build iOS (macOS runner)
  # ────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./cykel
        run: flutter pub get

      - name: 📱 Install CocoaPods dependencies
        working-directory: ./cykel/ios
        run: |
          pod repo update
          pod install

      - name: 🏗️ Build iOS (no codesign)
        working-directory: ./cykel
        run: flutter build ios --release --no-codesign

      - name: 📝 Build note
        run: |
          echo "✅ iOS build completed successfully"
          echo "⚠️ Code signing and IPA creation require Apple Developer credentials"
          echo "📦 To generate signed IPA locally, run:"
          echo "   flutter build ipa --release"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 6: Cloud Functions Build & Lint
  # ────────────────────────────────────────────────────────────────────────────
  functions:
    name: ⚡ Cloud Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: analyze
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cykel/functions/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./cykel/functions
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: ./cykel/functions
        run: npm run lint --if-present || echo "No lint script found"

      - name: 🏗️ Build TypeScript
        working-directory: ./cykel/functions
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # Job 7: Deployment Summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [analyze, test, build-android, functions]
    if: always()
    
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🎉 CYKEL CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Analyze | ${{ needs.analyze.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Android | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Functions | ${{ needs.functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
